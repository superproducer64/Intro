<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro • Calm Dating</title>
  <style>
    :root {
      --cream: #F8F5F2;
      --green: #4A7043;
      --soft-gray: #E5E0D8;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--cream);
      margin: 0;
      padding: 20px;
      color: #2C2C2C;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 52px; font-weight: 300; text-align: center; margin: 40px 0 8px; }
    .tagline { text-align: center; color: #666; font-size: 20px; margin-bottom: 40px; }
    .card { background: white; border-radius: 24px; padding: 28px; margin-bottom: 24px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); }
    input, button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 999px;
      font-size: 17px;
    }
    input { background: #f5f5f5; }
    button { background: var(--green); color: white; font-weight: 500; cursor: pointer; }
    button:active { transform: scale(0.98); }
    .toggle { text-align: center; color: #666; cursor: pointer; margin-top: 16px; }
    .status { padding: 12px; background: #E8F5E9; border-radius: 999px; text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Intro</h1>
    <p class="tagline">Intentional dating for introverts</p>

    <div id="admin-gate">
      <div class="card">
        <h2>🔒 Restricted</h2>
        <p style="color:#666; font-size:15px; margin-top:0;">This testing page is private. Enter the admin password to continue.</p>
        <input type="password" id="admin-password" placeholder="Admin password">
        <button id="admin-unlock-btn">Unlock</button>
        <div id="admin-error" style="color:#b00; text-align:center; margin-top:10px;"></div>
      </div>
    </div>

    <div id="auth-screen" style="display:none;">
      <div class="card">
        <h2 id="auth-title">Sign In</h2>

        <input type="text" id="name" placeholder="Your name" style="display:none;">
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password">

        <button id="signin-btn">Sign In</button>

        <div class="toggle" id="toggle-mode">
          Don't have an account? <strong>Sign up</strong>
        </div>
      </div>
    </div>

    <div id="main-screen" style="display:none;">
      <div class="status">✅ Logged in successfully</div>

      <div class="card">
        <h2>🌿 Gentle Discover</h2>
        <button id="load-profiles">Show Thoughtful Matches</button>
      </div>

      <div class="card">
        <h2>☕ Quiet Café</h2>
        <button data-room="cafe">Start Quiet Café</button>
        <button data-room="movie">🎥 Movie Night</button>
        <button data-room="game">🎲 Game Night</button>
      </div>

      <div id="result" class="card" style="min-height:120px;"></div>
    </div>
  </div>

  <script src="/app-auth.js"></script>
</body>
</html>
