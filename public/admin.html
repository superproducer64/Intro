<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro • Calm Dating</title>
  <style>
    :root { --cream: #F8F5F2; --green: #4A7043; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--cream);
      margin: 0;
      padding: 20px;
      color: #2C2C2C;
    }
    .container { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 52px; font-weight: 300; text-align: center; margin: 40px 0 8px; }
    .tagline { text-align: center; color: #666; font-size: 20px; margin-bottom: 40px; }
    .card { background: white; border-radius: 24px; padding: 28px; margin-bottom: 24px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); }
    input {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 999px;
      background: #f5f5f5;
      font-size: 17px;
    }
    button {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: var(--green); color: white; }
    .btn-apple { background: #000; color: white; }
    .toggle { text-align: center; color: #666; cursor: pointer; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Intro</h1>
    <p class="tagline">Intentional dating for introverts</p>

    <div class="card">
      <h2 id="auth-title">Sign In</h2>

      <input type="text" id="name" placeholder="Your name" style="display:none;">
      <input type="email" id="email" placeholder="Email address">
      <input type="password" id="password" placeholder="Password">

      <button class="btn-primary" onclick="handleAuth()">Sign In</button>
      <button class="btn-apple" onclick="appleSignIn()">Sign in with Apple</button>

      <div class="toggle" onclick="toggleAuthMode()">
        Don't have an account? <strong>Sign up</strong>
      </div>
    </div>

    <div id="main-screen" style="display:none;">
      <div class="card">
        <h2>Welcome to Intro</h2>
        <button class="btn-primary" onclick="loadProfiles()">🌿 Gentle Discover</button>
        <button class="btn-primary" onclick="createRoom('cafe')">☕ Quiet Café</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://intro-bgpstudioshou.replit.app';
    let isLogin = true;

    function toggleAuthMode() {
      isLogin = !isLogin;
      document.getElementById('auth-title').textContent = isLogin ? 'Sign In' : 'Create Account';
      document.getElementById('name').style.display = isLogin ? 'none' : 'block';
    }

    async function handleAuth() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const name = document.getElementById('name').value.trim();

      if (!email || !password || (!isLogin && !name)) {
        alert("Please fill all fields");
        return;
      }

      try {
        let response;
        if (isLogin) {
          response = await fetch(API + '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
          });
        } else {
          response = await fetch(API + '/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, email, password, age: 28, bio: '' })
          });
        }

        const data = await response.json();
        if (data.token) {
          alert(isLogin ? "Welcome back!" : "Account created successfully!");
          document.querySelector('.card').style.display = 'none';
          document.getElementById('main-screen').style.display = 'block';
        } else {
          alert(data.error || "Something went wrong");
        }
      } catch(e) {
        alert("Cannot connect to server. Is the backend running?");
      }
    }

    async function appleSignIn() {
      alert("Apple Sign In is not fully implemented yet in this web demo.\n\nBut your backend supports it!");
    }

    async function loadProfiles() {
      alert("Loading gentle matches... (Check browser console for details)");
      try {
        const res = await fetch(API + '/api/match/profiles');
        const data = await res.json();
        console.log("Profiles:", data);
      } catch(e) {
        console.error(e);
      }
    }

    async function createRoom(type) {
      alert(`Creating ${type} room...`);
    }
  </script>
</body>
</html>
