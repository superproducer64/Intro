<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Admin Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #7c3aed;
      --primary-light: #a78bfa;
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-light: #1f2b47;
      --text: #ffffff;
      --text-secondary: #a0a0a0;
      --success: #10b981;
      --danger: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: var(--surface);
      padding: 32px;
      border-radius: 16px;
    }
    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
      display: none;
    }
    h1 {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    h2 { margin: 24px 0 16px; color: var(--primary-light); }
    .subtitle { color: var(--text-secondary); margin-bottom: 24px; }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--surface-light);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      margin-bottom: 16px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    button {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); }
    .btn-secondary { background: var(--surface-light); }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--surface-light);
      padding-bottom: 16px;
    }
    .tab-btn {
      background: var(--surface);
      padding: 10px 20px;
      border-radius: 8px;
    }
    .tab-btn.active { background: var(--primary); }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-title { font-weight: 600; font-size: 18px; }
    .badge {
      background: var(--primary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--surface-light);
    }
    th { color: var(--text-secondary); font-weight: 500; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-number {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary-light);
    }
    .stat-label { color: var(--text-secondary); margin-top: 4px; }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .profile-card {
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
    }
    .profile-card input, .profile-card textarea {
      margin-bottom: 12px;
    }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .error { color: var(--danger); margin-bottom: 16px; }
    .success { color: var(--success); margin-bottom: 16px; }
    .hidden { display: none; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="login-container" id="loginContainer">
    <h1>Intro Admin</h1>
    <p class="subtitle">Sign in to manage your app</p>
    <div id="loginError" class="error hidden"></div>
    <input type="password" id="adminPassword" placeholder="Admin Password">
    <button onclick="login()" style="width: 100%">Sign In</button>
  </div>

  <div class="admin-container" id="adminContainer">
    <h1>Intro Admin Console</h1>
    <p class="subtitle">Manage profiles, signups, and experiences</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="profiles">Profiles</button>
      <button class="tab-btn" data-tab="signups">Signups</button>
    </div>

    <div id="dashboard" class="tab-content active">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-number" id="totalSignups">0</div>
          <div class="stat-label">Total Signups</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="cafeSignups">0</div>
          <div class="stat-label">Cafe Interest</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="movieSignups">0</div>
          <div class="stat-label">Movie Night</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="gamingSignups">0</div>
          <div class="stat-label">Gaming</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="bookSignups">0</div>
          <div class="stat-label">Book Club</div>
        </div>
      </div>
    </div>

    <div id="profiles" class="tab-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Manage Swipeable Profiles</span>
          <button onclick="addProfile()">+ Add Profile</button>
        </div>
        <div class="profile-grid" id="profilesGrid"></div>
      </div>
    </div>

    <div id="signups" class="tab-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Experience Signups</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Experience</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="signupsTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let profiles = [];
    const ADMIN_KEY = 'intro_admin_auth';

    async function login() {
      const password = document.getElementById('adminPassword').value;
      const errorEl = document.getElementById('loginError');
      
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem(ADMIN_KEY, data.token);
          showAdmin();
        } else {
          errorEl.textContent = 'Invalid password';
          errorEl.classList.remove('hidden');
        }
      } catch (e) {
        errorEl.textContent = 'Login failed';
        errorEl.classList.remove('hidden');
      }
    }

    function showAdmin() {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('adminContainer').style.display = 'block';
      loadData();
    }

    function getToken() {
      return localStorage.getItem(ADMIN_KEY);
    }

    async function loadData() {
      const token = getToken();
      
      const [signupsRes, profilesRes] = await Promise.all([
        fetch('/api/admin/signups', { headers: { 'Authorization': `Bearer ${token}` } }),
        fetch('/api/admin/profiles', { headers: { 'Authorization': `Bearer ${token}` } })
      ]);
      
      if (signupsRes.ok) {
        const signups = await signupsRes.json();
        renderSignups(signups);
        updateStats(signups);
      }
      
      if (profilesRes.ok) {
        profiles = await profilesRes.json();
        renderProfiles();
      }
    }

    function updateStats(signups) {
      document.getElementById('totalSignups').textContent = signups.length;
      document.getElementById('cafeSignups').textContent = signups.filter(s => s.experience === 'cafe').length;
      document.getElementById('movieSignups').textContent = signups.filter(s => s.experience === 'movie').length;
      document.getElementById('gamingSignups').textContent = signups.filter(s => s.experience === 'gaming').length;
      document.getElementById('bookSignups').textContent = signups.filter(s => s.experience === 'book').length;
    }

    function renderSignups(signups) {
      const table = document.getElementById('signupsTable');
      table.innerHTML = signups.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.email}</td>
          <td><span class="badge">${s.experience}</span></td>
          <td>${new Date(s.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }

    function renderProfiles() {
      const grid = document.getElementById('profilesGrid');
      grid.innerHTML = profiles.map((p, i) => `
        <div class="profile-card">
          <input type="text" value="${p.name}" id="name-${i}" placeholder="Name, Age">
          <textarea rows="3" id="bio-${i}" placeholder="Bio">${p.bio}</textarea>
          <div class="actions">
            <button onclick="saveProfile(${i})">Save</button>
            <button class="btn-danger" onclick="deleteProfile(${i})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function addProfile() {
      profiles.push({ name: 'New Profile, 25', bio: 'Add a bio here...' });
      renderProfiles();
    }

    async function saveProfile(index) {
      profiles[index].name = document.getElementById(`name-${index}`).value;
      profiles[index].bio = document.getElementById(`bio-${index}`).value;
      
      await fetch('/api/admin/profiles', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`
        },
        body: JSON.stringify(profiles)
      });
      
      alert('Profiles saved! Refresh the main app to see changes.');
    }

    function deleteProfile(index) {
      if (confirm('Delete this profile?')) {
        profiles.splice(index, 1);
        renderProfiles();
        saveAllProfiles();
      }
    }

    async function saveAllProfiles() {
      await fetch('/api/admin/profiles', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`
        },
        body: JSON.stringify(profiles)
      });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    if (localStorage.getItem(ADMIN_KEY)) {
      showAdmin();
    }
  </script>
</body>
</html>
