<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a1528"/>
      <stop offset="100%" stop-color="#0d0b14"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9b8f0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9b8f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0e6ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b89ee8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonFace" cx="38%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#e8deff"/>
      <stop offset="60%" stop-color="#c4abf2"/>
      <stop offset="100%" stop-color="#9b7de0"/>
    </radialGradient>
    <radialGradient id="innerCircle" cx="62%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1a1528"/>
      <stop offset="100%" stop-color="#130f20"/>
    </radialGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="dotBlur" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle noise texture via tiny circles -->
    <circle cx="200" cy="150" r="1.2" fill="#ffffff" opacity="0.12"/>
    <circle cx="380" cy="90" r="0.8" fill="#ffffff" opacity="0.08"/>
    <circle cx="720" cy="130" r="1.4" fill="#ffffff" opacity="0.15"/>
    <circle cx="850" cy="200" r="0.9" fill="#ffffff" opacity="0.10"/>
    <circle cx="140" cy="320" r="1.1" fill="#ffffff" opacity="0.09"/>
    <circle cx="900" cy="400" r="1.3" fill="#ffffff" opacity="0.11"/>
    <circle cx="760" cy="820" r="1.0" fill="#ffffff" opacity="0.08"/>
    <circle cx="180" cy="780" r="1.5" fill="#ffffff" opacity="0.13"/>
    <circle cx="600" cy="920" r="0.7" fill="#ffffff" opacity="0.07"/>
    <circle cx="450" cy="870" r="1.2" fill="#ffffff" opacity="0.10"/>
    <circle cx="300" cy="650" r="0.9" fill="#ffffff" opacity="0.08"/>
    <circle cx="820" cy="680" r="1.1" fill="#ffffff" opacity="0.09"/>

    <!-- Moon ambient glow (behind) -->
    <circle cx="468" cy="454" r="280" fill="url(#moonGlow)" filter="url(#softBlur)"/>

    <!-- Moon crescent: full circle -->
    <circle cx="468" cy="454" r="248" fill="url(#moonFace)"/>

    <!-- Crescent cutout circle (offset to create crescent) -->
    <circle cx="548" cy="420" r="204" fill="url(#innerCircle)"/>

    <!-- Tiny companion dot — the "other" in the quiet space -->
    <!-- Glow layer -->
    <circle cx="648" cy="318" r="44" fill="#c9b8f0" filter="url(#dotBlur)" opacity="0.6"/>
    <!-- Core dot -->
    <circle cx="648" cy="318" r="22" fill="#ede0ff" opacity="0.95"/>
    <!-- Inner highlight -->
    <circle cx="641" cy="311" r="9" fill="#ffffff" opacity="0.8"/>

    <!-- Wordmark: "intro" -->
    <text
      x="512"
      y="745"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="96"
      font-weight="400"
      letter-spacing="22"
      text-anchor="middle"
      fill="#d4c4f5"
      opacity="0.92"
      filter="url(#textGlow)"
    >intro</text>

    <!-- Delicate divider line above wordmark -->
    <line x1="312" y1="694" x2="712" y2="694" stroke="#7b6aa8" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
